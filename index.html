<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 do Gui - Convite Oficial</title>
    <!-- Configurações para Meta/WhatsApp Preview -->
    <meta property="og:title" content="Trintou do Gui 🍻">
    <meta property="og:description" content="Venha comemorar comigo! Chopp, Paella Caipira e Música Ao Vivo. Confirme sua presença!">
    <meta property="og:image" content="assets/ilustracao_gui.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Internal&family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #EAE6DF; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .flyer {
            width: 100%; max-width: 420px; min-height: 100dvh;
            background: #F8F6F0; /* Off-white, warm and modern */
            position: relative; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
        }
        @media (min-width: 421px) {
            .flyer {
                height: 92vh; max-height: 850px; min-height: auto;
                border-radius: 20px;
            }
        }

        /* Top header section */
        .header {
            text-align: center; padding: 40px 20px 20px; z-index: 10;
        }
        h1 { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 3.6rem; font-weight: 800; color: #2B3A2C; /* Elegant dark green */
            margin: 0; line-height: 0.95; letter-spacing: -2px; text-transform: uppercase;
        }
        .subtitle { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 1.1rem; font-weight: 500; font-style: italic; color: #A85A41; /* Terracotta */
            margin-top: 5px; 
        }

        /* Illustration wrapper */
        .image-wrapper {
            flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; padding: 0 20px;
        }
        .illustration {
            width: 100%; max-width: 320px; height: 350px;
            background-image: url('assets/ilustracao_gui.png');
            background-size: cover; background-position: center;
            border-radius: 20px; /* Modern soft rectangle */
            box-shadow: 0 15px 35px rgba(43, 58, 44, 0.15);
            border: 6px solid #FFFFFF;
        }

        /* Bottom Details */
        .content {
            padding: 10px 25px 50px; color: #3A3A3A; text-align: center; z-index: 10;
        }
        .date-badge {
            background: #2B3A2C; color: #F8F6F0;
            display: inline-block; padding: 8px 24px; border-radius: 30px;
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; font-weight: 700;
            margin-bottom: 25px; box-shadow: 0 10px 20px rgba(43, 58, 44, 0.2);
        }
        .info-grid {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; align-items: flex-end;
        }
        .info-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 700; color: #2B3A2C; text-transform: uppercase; text-align: center;
        }
        .info-icon { font-size: 1.4rem; }
        
        .location { font-size: 0.95rem; font-weight: 500; color: #5A5A5A; line-height: 1.5; margin-bottom: 20px;}
        .location b { color: #2B3A2C; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif;}

        .price-cta-wrapper {
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.08); width: 95%; margin: 0 auto;
        }
        .price {
            font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 1.3rem; color: #A85A41;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .pix-text {
            font-size: 0.65rem; font-weight: 600; font-family: 'Inter', sans-serif; color: #5A5A5A; margin-top: 4px; text-transform: none; letter-spacing: 0;
        }
        .cta-btn {
            background: #A85A41; color: #FFFFFF; text-decoration: none; padding: 10px 14px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; box-shadow: 0 4px 10px rgba(168, 90, 65, 0.3); font-family: 'Inter', sans-serif; text-transform: uppercase; transition: background 0.2s;
        }
        .cta-btn:hover { background: #8e4933; transform: scale(1.02); }

        /* Abstract gentle blobs for jovial look */
        .bg-blob { position: absolute; border-radius: 50%; opacity: 0.08; z-index: 0;}
        .blob1 { width: 350px; height: 350px; background: #2B3A2C; top: -50px; left: -100px; }
        .blob2 { width: 450px; height: 450px; background: #A85A41; bottom: -150px; right: -150px; }
    </style>
</head>
<body>
    <div class="flyer">
        <div class="bg-blob blob1"></div>
        <div class="bg-blob blob2"></div>
        
        <div class="header">
            <h1>30 do Gui</h1>
            <div class="subtitle">(Paulista, Vido ou Calli)</div>
        </div>
        
        <div class="image-wrapper">
            <div class="illustration"></div>
        </div>
        
        <div class="content">
            <div class="date-badge">18/4 (Sábado) às 12h</div>
            
            <div class="info-grid">
                <div class="info-item"><span class="info-icon">🍺</span>Chopp</div>
                <div class="info-item"><span class="info-icon">🥘</span>Paella Caipira</div>
                <div class="info-item"><span class="info-icon">🎤</span>Música Ao Vivo</div>
            </div>
            
            <div class="location">
                <b>Condomínio Mosteiro de Itaici</b><br>
                Rua das Perobas, 1100 - Indaiatuba/SP
            </div>
            
            <div class="price-cta-wrapper">
                <div class="price">
                    R$ 70,00
                    <span class="pix-text">Pix (CPF): 399.534.078-43</span>
                </div>
                <a href="https://forms.gle/H3xrwV3WzPEQWDkg9" target="_blank" class="cta-btn">Confirmar Presença</a>
            </div>
        </div>
    </div>
</body>
</html>
